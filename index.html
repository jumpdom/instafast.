<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Video Downloader</title>
    <!-- आपकी style.css फ़ाइल को लिंक किया गया है -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="downloader-box">
            <h2>Instagram Video Downloader</h2>
            <p>इंस्टाग्राम रील्स और वीडियो डाउनलोड करने के लिए नीचे लिंक पेस्ट करें</p>
            
            <!-- इनपुट एरिया -->
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="यहाँ Instagram Reel का लिंक पेस्ट करें...">
                <button id="downloadBtn">Download</button>
            </div>

            <!-- यहाँ पर वीडियो का डाउनलोड बटन और रिस्पॉन्स दिखेगा -->
            <div id="result"></div>
        </div>
    </div>

    <!-- सबसे ज़रूरी लाइन: JavaScript फ़ाइल को लिंक करना -->
    <script src="script.js"></script>
</body>
</html>
